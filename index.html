<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>A&M Nebula | AI Chat - Al-Azhar Secondary</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        /* Remove blue outline from all interactive elements */
        *:focus, *:focus-visible, *:active {
            outline: none !important;
            box-shadow: none !important;
        }

        button:focus, button:focus-visible, 
        input:focus, input:focus-visible,
        textarea:focus, textarea:focus-visible,
        .icon-btn:focus, .send-btn:focus {
            outline: none !important;
            box-shadow: none !important;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 10% 20%, #0a0f1e, #03050b);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
            position: relative;
        }

        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .stars::after {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: transparent;
            box-shadow: 20vw 10vh 2px #fff, 45vw 80vh 2px #f8f9fc, 70vw 30vh 2px #ffe9c7,
                        12vw 90vh 2px #fff, 85vw 15vh 2px #ffe0b5, 33vw 55vh 2px #fff,
                        92vw 88vh 2px #fdfdfd, 5vw 45vh 2px #fff, 60vw 70vh 2px #ffefd0,
                        47vw 20vh 2px #ffffff, 77vw 92vh 2px #fff, 3vw 62vh 2px #fff,
                        28vw 38vh 2px #fffacd, 54vw 12vh 2px #ffffff, 88vw 47vh 2px #fff;
            animation: starGlow 3s infinite alternate;
        }
        @keyframes starGlow {
            0% { opacity: 0.4; }
            100% { opacity: 1; text-shadow: 0 0 4px rgba(255,255,200,0.8); }
        }

        /* Password Overlay */
        .password-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(3, 5, 11, 0.98);
            backdrop-filter: blur(20px);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .password-card {
            background: rgba(10, 20, 35, 0.95);
            border-radius: 48px;
            padding: 40px 28px;
            width: 90%;
            max-width: 380px;
            border: 1px solid rgba(0, 255, 255, 0.5);
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.2);
            text-align: center;
        }
        .password-card h2 {
            color: #aaf0ff;
            margin-bottom: 12px;
            font-size: 1.6rem;
        }
        .password-card p {
            color: #bbd9ff;
            margin-bottom: 20px;
            font-size: 0.85rem;
        }
        .password-input {
            width: 100%;
            padding: 14px 20px;
            border-radius: 60px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #0ff;
            color: white;
            font-size: 1rem;
            text-align: center;
        }
        .password-btn {
            margin-top: 24px;
            background: linear-gradient(145deg, #00b4aa, #0066cc);
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 1rem;
            transition: 0.2s;
        }
        .password-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 12px rgba(0, 255, 255, 0.3);
        }
        .error-msg { color: #ff8a7a; margin-top: 16px; font-size: 0.8rem; }

        /* Main Chat */
        .chat-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 1300px;
            height: 92vh;
            background: rgba(8, 12, 25, 0.7);
            backdrop-filter: blur(14px);
            border-radius: 40px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(0, 255, 255, 0.2), 0 0 12px rgba(0, 210, 255, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .header {
            padding: 16px 22px;
            border-bottom: 1px solid rgba(0, 255, 255, 0.25);
            background: rgba(0, 0, 0, 0.3);
            border-radius: 40px 40px 0 0;
        }
        .brand {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }
        .logo h1 {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #a0f0ff, #5d9eff, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .logo p { font-size: 0.65rem; color: #a0c4ff; }
        .badge-ai {
            background: rgba(0, 230, 200, 0.15);
            border-radius: 60px;
            padding: 5px 14px;
            border: 1px solid rgba(0, 255, 200, 0.5);
            font-size: 0.7rem;
            color: #aaf0ff;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 18px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            scroll-behavior: smooth;
        }
        .chat-messages::-webkit-scrollbar { width: 4px; }
        .chat-messages::-webkit-scrollbar-track { background: rgba(0, 20, 40, 0.5); border-radius: 10px; }
        .chat-messages::-webkit-scrollbar-thumb { background: #0ff; border-radius: 10px; }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 85%;
            border-radius: 24px;
            padding: 10px 16px;
            word-wrap: break-word;
            animation: fadeSlideUp 0.2s ease;
        }
        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .user-message {
            align-self: flex-end;
            background: rgba(0, 180, 216, 0.2);
            border: 1px solid rgba(0, 255, 210, 0.5);
            border-radius: 24px 24px 6px 24px;
        }
        .ai-message {
            align-self: flex-start;
            background: rgba(25, 35, 60, 0.9);
            border: 1px solid rgba(130, 200, 255, 0.5);
            border-radius: 24px 24px 24px 6px;
        }
        .system-message {
            align-self: center;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 200, 100, 0.4);
            border-radius: 40px;
            font-size: 0.7rem;
            max-width: 95%;
            text-align: center;
        }
        .message-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 5px;
            font-size: 0.6rem;
            font-weight: 600;
        }
        .user-message .message-header { color: #7effe6; }
        .ai-message .message-header { color: #b9e2ff; }
        .message-content {
            font-size: 0.9rem;
            line-height: 1.45;
            color: #f0f3fa;
        }
        .message-image {
            max-width: 180px;
            max-height: 140px;
            border-radius: 18px;
            margin-top: 6px;
            border: 1px solid cyan;
            cursor: pointer;
        }
        .timestamp {
            font-size: 0.5rem;
            opacity: 0.6;
            margin-top: 5px;
        }
        .user-message .timestamp { text-align: right; }

        .input-area {
            padding: 14px 18px 20px;
            background: rgba(0, 0, 0, 0.4);
            border-top: 1px solid rgba(0, 255, 255, 0.2);
            border-radius: 0 0 40px 40px;
        }
        .input-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(12, 18, 32, 0.85);
            border-radius: 60px;
            padding: 5px 8px 5px 12px;
            border: 1px solid rgba(0, 255, 255, 0.4);
            transition: all 0.2s;
        }
        .input-wrapper:focus-within {
            border-color: #0ff;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
        }
        .input-wrapper textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: #eef5ff;
            font-size: 0.9rem;
            resize: none;
            max-height: 70px;
            min-height: 42px;
            padding: 10px 4px;
            font-family: 'Cairo', sans-serif;
        }
        .input-wrapper textarea::placeholder {
            color: #6c86a8;
        }
        .action-buttons {
            display: flex;
            gap: 6px;
            align-items: center;
            flex-shrink: 0;
        }
        .icon-btn {
            background: none;
            border: none;
            color: #8db9ff;
            font-size: 1.3rem;
            cursor: pointer;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }
        .icon-btn:active { transform: scale(0.95); }
        .send-btn {
            background: linear-gradient(145deg, #00b4aa, #0066cc);
            border: none;
            color: white;
            border-radius: 40px;
            padding: 8px 18px;
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
            white-space: nowrap;
            transition: 0.2s;
        }
        .send-btn:active { transform: scale(0.95); }
        .preview-tag {
            margin-top: 8px;
            font-size: 0.7rem;
            background: rgba(0,200,200,0.2);
            display: inline-block;
            padding: 4px 12px;
            border-radius: 40px;
            color: #8efff0;
        }
        @media (max-width: 600px) {
            body { padding: 6px; }
            .chat-container { height: 94vh; border-radius: 28px; }
            .message { max-width: 92%; }
            .logo h1 { font-size: 1.2rem; }
            .header { padding: 12px 16px; }
            .input-area { padding: 10px 14px 16px; }
            .icon-btn { width: 34px; height: 34px; font-size: 1.1rem; }
            .send-btn { padding: 6px 14px; font-size: 0.75rem; }
        }
    </style>
</head>
<body>
<div class="stars"></div>

<div id="passwordOverlay" class="password-overlay">
    <div class="password-card">
        <h2><i class="fas fa-lock"></i> A&M Protected</h2>
        <p>أدخل كلمة المرور للدخول إلى غرفة الدراسة الذكية</p>
        <input type="password" id="passwordInput" class="password-input" placeholder="•••••••" autocomplete="off">
        <button id="submitPassword" class="password-btn"><i class="fas fa-key"></i> دخول</button>
        <div id="passError" class="error-msg"></div>
    </div>
</div>

<div id="chatApp" class="chat-container" style="display: none;">
    <div class="header">
        <div class="brand">
            <div class="logo">
                <h1>✨ A&M Nebula ✨</h1>
                <p>الثانوية الأزهرية للبنات | ذكاء اصطناعي متقدم</p>
            </div>
            <div class="badge-ai">
                <i class="fas fa-brain"></i> <span id="modelBadge">Gemini 2.0</span>
            </div>
        </div>
    </div>

    <div class="chat-messages" id="chatMessages"></div>

    <div class="input-area">
        <div class="input-wrapper">
            <textarea id="messageInput" rows="1" placeholder="اكتب سؤالك بالعامية المصرية أو أرفق صورة..."></textarea>
            <div class="action-buttons">
                <label for="imageInput" class="icon-btn" style="cursor:pointer;">
                    <i class="fas fa-image"></i>
                </label>
                <input type="file" id="imageInput" accept="image/*" style="display:none">
                <button id="aiSendBtn" class="icon-btn" title="AI Magic - تحليل ذكي">
                    <i class="fas fa-magic"></i>
                </button>
                <button id="normalSendBtn" class="send-btn">إرسال</button>
            </div>
        </div>
        <div id="imagePreview" class="preview-tag" style="display: none;"></div>
    </div>
</div>

<script>
    // ==================== API CONFIGURATION ====================
    // ⚠️ IMPORTANT: Replace with your own API key from https://aistudio.google.com/apikey
const API_KEY = process.env.GEMINI_API_KEY || "";
    // Using Google Gemini 2.0 Flash
    // السطر 278 - هذا هو الرابط الصحيح
const API_URL = "https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent";
    
    const SYSTEM_PROMPT = `أنت معلم خصوصي لطالبات الصف الثاني الثانوي الأزهري. تتحدث بالعامية المصرية بشكل طبيعي ولطيف. دورك: شرح المواد (فيزياء، عربي، دين، إنجليزي، كيمياء، أحياء) بأسلوب بسيط. تحب الطالبات وتساعدهن في المذاكرة. ترد بشكل عفوي وطبيعي. إذا أرسلت الطالبة صورة، قم بتحليل محتواها وشرحه. استخدم رموز تعبيرية بسيطة. لا تخرج عن كونك معلم متخصص في المنهج الأزهري.`;
    
    // ==================== DOM ELEMENTS ====================
    const passwordOverlay = document.getElementById('passwordOverlay');
    const chatApp = document.getElementById('chatApp');
    const chatMessagesDiv = document.getElementById('chatMessages');
    const messageInput = document.getElementById('messageInput');
    const imageInput = document.getElementById('imageInput');
    const imagePreviewDiv = document.getElementById('imagePreview');
    const aiSendBtn = document.getElementById('aiSendBtn');
    const normalSendBtn = document.getElementById('normalSendBtn');
    const passwordInputField = document.getElementById('passwordInput');
    const submitPasswordBtn = document.getElementById('submitPassword');
    const passErrorDiv = document.getElementById('passError');
    
    // ==================== VARIABLES ====================
    const CORRECT_PASSWORD = "2010122";
    let messageHistory = [];
    let currentAttachedImage = null;
    let loadingElement = null;
    
    // ==================== CHAT FUNCTIONS ====================
    function loadChatHistory() {
        const stored = localStorage.getItem('aandm_real_ai');
        if (stored) {
            try {
                messageHistory = JSON.parse(stored);
                renderAllMessages();
                return;
            } catch(e) {}
        }
        messageHistory = [
            { type: 'system', text: "✨ مرحباً بك في A&M Nebula – تم الاتصال بنموذج الذكاء الاصطناعي الحقيقي. جميع المحادثات محفوظة للجميع.", timestamp: new Date().toISOString(), image: null },
            { type: 'ai', text: "أهلاً بيكي يا جميلة! 🌙 أنا هنا عشان أساعدك في المذاكرة. أنا متصل بـ Gemini AI فاهم الصور واللغة العربية باحترافية. اسأليني أي حاجة وفي أي مادة، ولو عندك صورة لدرس ارفعيها وهحللها فوراً. شدي حيلك يا بطلة الأزهر 💪✨", timestamp: new Date().toISOString(), image: null }
        ];
        saveChatHistory();
        renderAllMessages();
    }
    
    function saveChatHistory() {
        localStorage.setItem('aandm_real_ai', JSON.stringify(messageHistory));
    }
    
    function renderAllMessages() {
        if (!chatMessagesDiv) return;
        chatMessagesDiv.innerHTML = '';
        messageHistory.forEach(msg => {
            chatMessagesDiv.appendChild(createMessageElement(msg));
        });
        scrollToBottom();
    }
    
    function createMessageElement(msg) {
        const div = document.createElement('div');
        div.classList.add('message');
        if (msg.type === 'user') div.classList.add('user-message');
        else if (msg.type === 'ai') div.classList.add('ai-message');
        else div.classList.add('system-message');
        
        const header = document.createElement('div');
        header.classList.add('message-header');
        let timeStr = new Date(msg.timestamp).toLocaleTimeString('ar-EG', { hour:'2-digit', minute:'2-digit' });
        if (msg.type === 'user') header.innerHTML = `<i class="fas fa-user"></i> أنت · ${timeStr}`;
        else if (msg.type === 'ai') header.innerHTML = `<i class="fas fa-robot"></i> A&M AI (Gemini) · ${timeStr}`;
        else header.innerHTML = `<i class="fas fa-info-circle"></i> النظام · ${timeStr}`;
        
        const content = document.createElement('div');
        content.classList.add('message-content');
        content.innerText = msg.text;
        
        div.appendChild(header);
        div.appendChild(content);
        if (msg.image && msg.type === 'user') {
            const img = document.createElement('img');
            img.src = msg.image;
            img.classList.add('message-image');
            div.appendChild(img);
        }
        const stamp = document.createElement('div');
        stamp.classList.add('timestamp');
        stamp.innerText = timeStr;
        div.appendChild(stamp);
        return div;
    }
    
    function appendMessage(type, text, imageBase64 = null) {
        const newMsg = { type, text, image: imageBase64 || null, timestamp: new Date().toISOString() };
        messageHistory.push(newMsg);
        saveChatHistory();
        if (chatMessagesDiv) {
            chatMessagesDiv.appendChild(createMessageElement(newMsg));
            scrollToBottom();
        }
        return newMsg;
    }
    
    function scrollToBottom() {
        if (chatMessagesDiv) chatMessagesDiv.scrollTop = chatMessagesDiv.scrollHeight;
    }
    
    function showLoading() {
        if (loadingElement) loadingElement.remove();
        const loadingDiv = document.createElement('div');
        loadingDiv.classList.add('message', 'ai-message');
        loadingDiv.id = 'ai-loading';
        loadingDiv.innerHTML = `<div class="message-header"><i class="fas fa-spinner fa-pulse"></i> A&M AI بتفكر...</div><div class="message-content">🤖 بقرأ سؤالك و بشوف الصورة... لحظة واحدة</div>`;
        chatMessagesDiv.appendChild(loadingDiv);
        scrollToBottom();
        loadingElement = loadingDiv;
    }
    
    function removeLoading() {
        if (loadingElement) {
            loadingElement.remove();
            loadingElement = null;
        }
    }
    
    // ==================== API CALL ====================
    async function callGeminiAPI(userText, imageBase64) {
        const contents = [];
        let userPrompt = userText || "حلل هذه الصورة واشرح محتواها الدراسي";
        
        const parts = [{ text: userPrompt }];
        
        if (imageBase64) {
            const base64Data = imageBase64.split(',')[1];
            const mimeType = imageBase64.match(/data:(image\/\w+);/)?.[1] || "image/jpeg";
            parts.push({
                inlineData: {
                    mimeType: mimeType,
                    data: base64Data
                }
            });
        }
        
        contents.push({
            role: "user",
            parts: parts
        });
        
        const requestBody = {
            contents: contents,
            systemInstruction: {
                parts: [{ text: SYSTEM_PROMPT }]
            },
            generationConfig: {
                temperature: 0.7,
                topP: 0.95,
                maxOutputTokens: 2048
            }
        };
        
        const response = await fetch(`${API_URL}?key=${API_KEY}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(requestBody)
        });
        
        if (!response.ok) {
            const errorData = await response.text();
            throw new Error(`API Error: ${response.status}`);
        }
        
        const data = await response.json();
        const aiText = data.candidates?.[0]?.content?.parts?.[0]?.text;
        if (!aiText) throw new Error("لم استقبل رد من الذكاء الاصطناعي");
        return aiText;
    }
    
    async function sendWithAIMagic() {
        const textMsg = messageInput.value.trim();
        if (!textMsg && !currentAttachedImage) {
            appendMessage('system', "⚠️ من فضلك اكتب رسالة أو ارفع صورة قبل استخدام زر السحر ✨");
            return;
        }
        
        const userFinalText = textMsg || "📎 طلب تحليل الصورة";
        const attachedImgCopy = currentAttachedImage;
        
        appendMessage('user', userFinalText, attachedImgCopy);
        
        messageInput.value = '';
        currentAttachedImage = null;
        imageInput.value = '';
        imagePreviewDiv.style.display = 'none';
        imagePreviewDiv.innerHTML = '';
        
        showLoading();
        
        try {
            const aiResponse = await callGeminiAPI(userFinalText, attachedImgCopy);
            removeLoading();
            appendMessage('ai', aiResponse);
        } catch (error) {
            removeLoading();
            console.error("API Error:", error);
            appendMessage('system', `❌ خطأ: ${error.message}. تأكد من اتصال الإنترنت ومفتاح API.`);
        }
    }
    
    function sendNormalMessage() {
        const textMsg = messageInput.value.trim();
        if (!textMsg && !currentAttachedImage) return;
        
        appendMessage('user', textMsg || "📎 مرفق صورة", currentAttachedImage);
        
        messageInput.value = '';
        currentAttachedImage = null;
        imageInput.value = '';
        imagePreviewDiv.style.display = 'none';
        imagePreviewDiv.innerHTML = '';
        
        appendMessage('ai', "📢 تم استلام رسالتك! عشان تحصل على رد من الذكاء الاصطناعي الحقيقي (Gemini AI) اضغط على زر السحر ✨. أنا هنا اساعدك في المذاكرة!");
    }
    
    // ==================== EVENT LISTENERS ====================
    imageInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) {
            currentAttachedImage = null;
            imagePreviewDiv.style.display = 'none';
            return;
        }
        const reader = new FileReader();
        reader.onload = (ev) => {
            currentAttachedImage = ev.target.result;
            imagePreviewDiv.style.display = 'inline-block';
            imagePreviewDiv.innerHTML = `<i class="fas fa-paperclip"></i> الصورة جاهزة · ${file.name.substring(0, 18)} <i class="fas fa-times-circle" id="clearImageBtn" style="margin-left: 8px; cursor:pointer;"></i>`;
            const clearBtn = document.getElementById('clearImageBtn');
            if (clearBtn) clearBtn.onclick = () => {
                currentAttachedImage = null;
                imageInput.value = '';
                imagePreviewDiv.style.display = 'none';
            };
        };
        reader.readAsDataURL(file);
    });
    
    aiSendBtn.addEventListener('click', sendWithAIMagic);
    normalSendBtn.addEventListener('click', sendNormalMessage);
    
    messageInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            normalSendBtn.click();
        }
    });
    
    messageInput.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 80) + 'px';
    });
    
    // ==================== AUTHENTICATION ====================
    function authenticate(password) {
        if (password === CORRECT_PASSWORD) {
            passwordOverlay.style.display = 'none';
            chatApp.style.display = 'flex';
            loadChatHistory();
        } else {
            passErrorDiv.innerText = "❌ كلمة المرور غير صحيحة. دخول ممنوع.";
            passwordInputField.value = '';
        }
    }
    
    submitPasswordBtn.addEventListener('click', () => {
        authenticate(passwordInputField.value);
    });
    
    passwordInputField.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            authenticate(passwordInputField.value);
        }
    });
    
    window.addEventListener('load', () => {
        passwordOverlay.style.display = 'flex';
        chatApp.style.display = 'none';
    });
</script>
</body>
</html>
