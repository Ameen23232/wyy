<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>أزهريات 2026 | شات مباشر + معلمة ذكية</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0e0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            font-family: -apple-system, 'Cairo', system-ui, sans-serif;
        }

        .app-container {
            max-width: 750px;
            width: 100%;
            height: 94vh;
            background: #121812;
            border-radius: 32px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .chat-header {
            background: #1a221a;
            padding: 1rem;
            text-align: center;
            border-bottom: 1px solid #2a302a;
        }
        .chat-header h1 {
            font-size: 1.4rem;
            color: #9ece9e;
        }
        .chat-header p {
            font-size: 0.7rem;
            color: #8a9a88;
            margin-top: 4px;
        }
        .online-badge {
            background: #2c5a2e;
            color: #9ece9e;
            font-size: 0.65rem;
            padding: 3px 12px;
            border-radius: 20px;
            display: inline-block;
            margin-top: 6px;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #121812;
        }

        .messages-area::-webkit-scrollbar {
            width: 5px;
        }
        .messages-area::-webkit-scrollbar-track {
            background: #1a221a;
        }
        .messages-area::-webkit-scrollbar-thumb {
            background: #3a4a3a;
            border-radius: 10px;
        }

        .message {
            display: flex;
            gap: 10px;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-avatar {
            width: 38px;
            height: 38px;
            background: linear-gradient(135deg, #2a5a2e, #1a3a1e);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        .message-content {
            background: #1e261e;
            padding: 10px 16px;
            border-radius: 20px;
            border-top-right-radius: 6px;
            max-width: 85%;
        }

        .message-meta {
            font-size: 0.65rem;
            color: #8a9a88;
            margin-bottom: 5px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .message-author {
            font-weight: 600;
            color: #c0dcc0;
        }

        .message-text {
            font-size: 0.92rem;
            color: #e5f0e5;
            line-height: 1.45;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .own-message {
            flex-direction: row-reverse;
        }
        .own-message .message-content {
            background: #2c5a2e;
            border-top-left-radius: 6px;
            border-top-right-radius: 20px;
        }
        .own-message .message-text {
            color: #ffffff;
        }

        .tutor-message .message-content {
            background: #2a2218;
            border-right: 3px solid #b47c48;
        }
        .tutor-message .message-author {
            color: #f0b87a;
        }

        .input-panel {
            background: #1a221a;
            padding: 12px 16px 20px;
            border-top: 1px solid #2a302a;
        }

        .input-row {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .input-row textarea {
            flex: 1;
            border: 1px solid #2a5a2e;
            border-radius: 28px;
            padding: 12px 18px;
            font-size: 0.92rem;
            resize: none;
            background: #0e140e;
            font-family: inherit;
            outline: none;
            color: #e5f0e5;
        }

        .input-row textarea::placeholder {
            color: #5a6a58;
        }

        button {
            background: #2c5a2e;
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        button:active {
            transform: scale(0.96);
        }

        .ai-btn {
            background: #b47c48;
        }

        .status {
            font-size: 0.7rem;
            color: #8a9a88;
            text-align: center;
            margin-top: 10px;
        }

        .loading {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid #5a6a58;
            border-top-color: #9ece9e;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-left: 6px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        footer {
            font-size: 0.6rem;
            text-align: center;
            background: #0e140e;
            padding: 6px;
            color: #5a6a58;
        }

        @media (max-width: 550px) {
            body { padding: 8px; }
            .app-container { height: 95vh; border-radius: 24px; }
            .message-content { max-width: 90%; }
            .ai-btn { padding: 8px 14px; font-size: 0.75rem; }
            button { padding: 8px 14px; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="chat-header">
        <h1>📚 نور الأزهر | دفعة 2026</h1>
        <p>معلمتك الخصوصية 🧑‍🏫 | دردشة مباشرة وجماعية</p>
        <div class="online-badge">🟢 أي رسالة تظهر للجميع فوراً</div>
    </div>

    <div class="messages-area" id="chatMessages"></div>

    <div class="input-panel">
        <div class="input-row">
            <textarea id="messageInput" rows="1" placeholder="اسألي عن أي درس... أو قوليلي عامله ايه 😊"></textarea>
            <button id="sendBtn">📤 إرسال</button>
            <button id="aiRespondBtn" class="ai-btn">🤖 رد بالذكاء</button>
        </div>
        <div id="statusMsg" class="status">✨ جاهزة للإجابة</div>
    </div>
    <footer>🗨️ كل الرسائل تظهر لكل الطالبات • حفظ تلقائي في السحابة • معلمة الأزهر الذكية</footer>
</div>

<script>
    (function() {
        // -------------------- إعدادات Google Sheets API --------------------
        // تم إدخال الرابط الخاص بك هنا
        const SHEET_API_URL = "https://script.google.com/macros/s/AKfycbx9AUm_QgcXQSaPEMed3TNCylvH9ORqpiOrZtLYqel9Frb2-OlBjI7d64_ZtIar4KjR/exec";
        
        // -------------------- إعدادات Groq API --------------------
        const GROQ_API_KEY = "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";
        const GROQ_ENDPOINT = "https://api.groq.com/openai/v1/chat/completions";
        const MODEL_NAME = "llama-3.3-70b-versatile";
        
        // -------------------- هوية المستخدم --------------------
        let currentUserId = localStorage.getItem('azhar_user_id');
        if (!currentUserId) {
            currentUserId = 'user_' + Math.random().toString(36).substr(2, 10);
            localStorage.setItem('azhar_user_id', currentUserId);
        }
        
        let currentUserName = localStorage.getItem('azhar_user_name');
        if (!currentUserName) {
            const names = ['نور', 'أمل', 'سارة', 'ليلى', 'مريم', 'حبيبة', 'فاطمة', 'زينب', 'آية', 'جنى'];
            currentUserName = names[Math.floor(Math.random() * names.length)];
            localStorage.setItem('azhar_user_name', currentUserName);
        }
        
        // عناصر DOM
        let chatContainer, messageInput, sendBtn, aiRespondBtn, statusDiv;
        let isProcessing = false;
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        function setStatus(msg, isLoading = false) {
            if (statusDiv) {
                if (isLoading) {
                    statusDiv.innerHTML = `<span class="loading"></span> ${msg}`;
                } else {
                    statusDiv.innerHTML = msg;
                }
            }
        }
        
        function cleanText(text) {
            if (!text) return '';
            text = text.replace(/[\u4e00-\u9fff\u3400-\u4dbf\uac00-\ud7af\u3040-\u30ff]/g, '');
            text = text.replace(/【.*?】/g, '');
            text = text.replace(/\[.*?\]/g, '');
            text = text.replace(/وعليكم السلام ورحمة الله وبركاته/gi, '');
            text = text.replace(/السلام عليكم ورحمة الله وبركاته/gi, '');
            text = text.replace(/السلام عليكم/gi, '');
            return text.trim();
        }
        
        let displayedMessages = new Set();
        
        function displayMessage(id, author, authorId, text, timestamp, isTutor) {
            if (displayedMessages.has(id)) return;
            displayedMessages.add(id);
            if (!chatContainer) return;
            
            const isOwn = (authorId === currentUserId);
            
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message';
            if (isOwn) messageDiv.classList.add('own-message');
            if (isTutor) messageDiv.classList.add('tutor-message');
            messageDiv.id = `msg-${id}`;
            
            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            if (isTutor) avatar.innerText = '🧑‍🏫';
            else if (isOwn) avatar.innerText = '👧';
            else avatar.innerText = '👩‍🎓';
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            
            const metaDiv = document.createElement('div');
            metaDiv.className = 'message-meta';
            const timeStr = timestamp ? new Date(timestamp).toLocaleTimeString('ar-EG', { hour: '2-digit', minute:'2-digit' }) : 'الآن';
            metaDiv.innerHTML = `<span class="message-author">${escapeHtml(author)}</span><span>${timeStr}</span>`;
            
            const textDiv = document.createElement('div');
            textDiv.className = 'message-text';
            textDiv.innerHTML = `<p style="margin:0; white-space:pre-wrap;">${escapeHtml(text)}</p>`;
            
            contentDiv.appendChild(metaDiv);
            contentDiv.appendChild(textDiv);
            messageDiv.appendChild(avatar);
            messageDiv.appendChild(contentDiv);
            
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
        
        async function fetchMessages() {
            try {
                const response = await fetch(`${SHEET_API_URL}?action=get&t=${Date.now()}`);
                const data = await response.json();
                
                if (data.success && data.messages) {
                    data.messages.forEach(msg => {
                        displayMessage(msg.id, msg.author, msg.authorId, msg.text, msg.timestamp, msg.isTutor === true);
                    });
                }
            } catch (error) {
                console.error("Error fetching messages:", error);
            }
        }
        
        async function sendMessageToSheet(id, author, authorId, text, timestamp, isTutor) {
            try {
                const url = `${SHEET_API_URL}?action=post&id=${encodeURIComponent(id)}&author=${encodeURIComponent(author)}&authorId=${encodeURIComponent(authorId)}&text=${encodeURIComponent(text)}&timestamp=${timestamp}&isTutor=${isTutor}`;
                await fetch(url);
            } catch (error) {
                console.error("Error sending message:", error);
                throw error;
            }
        }
        
        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text) {
                setStatus("⚠️ اكتبي سؤال أو رسالة", false);
                setTimeout(() => setStatus("✨ جاهزة", false), 1500);
                return;
            }
            
            setStatus("📤 جاري الإرسال...", true);
            
            const newId = Date.now().toString() + '_' + Math.random().toString(36).substr(2, 5);
            
            try {
                await sendMessageToSheet(newId, currentUserName, currentUserId, text, Date.now(), false);
                messageInput.value = '';
                setStatus("✅ تم الإرسال", false);
                setTimeout(() => setStatus("✨ جاهزة", false), 1500);
                await fetchMessages();
            } catch (error) {
                setStatus("⚠️ فشل الإرسال، تأكدي من النت", false);
            }
        }
        
        async function aiRespond() {
            if (isProcessing) {
                setStatus("⚠️ استني شوية، الأستاذة بترد حالياً", false);
                return;
            }
            
            isProcessing = true;
            setStatus("📚 الأستاذة بتفكر...", true);
            
            try {
                const response = await fetch(`${SHEET_API_URL}?action=get&t=${Date.now()}`);
                const data = await response.json();
                
                if (!data.success || !data.messages) {
                    throw new Error("Failed to fetch messages");
                }
                
                const userMessages = data.messages.filter(m => m.authorId !== 'tutor_bot');
                if (userMessages.length === 0) {
                    setStatus("⚠️ يابنتي اكتبي سؤالك الأول عشان أرد عليكِ", false);
                    isProcessing = false;
                    setTimeout(() => setStatus("✨ جاهزة", false), 2000);
                    return;
                }
                
                const lastMessage = userMessages[userMessages.length - 1];
                const userQuestion = lastMessage.text;
                const questionAuthor = lastMessage.author;
                
                const systemPrompt = `أنت أستاذة خصوصية مصرية لطالبات الصف الثاني الثانوي الأزهري (دفعة 2026). اسمك "أستاذة نور".

قواعد مهمة جداً:
1. تكلمي باللهجة المصرية البسيطة واللطيفة.
2. لو الطالبة سألت "عامله ايه" أو "ازيك" أو "عامل إيه"، ردّي: "أنا زي الفل يا حبيبتي، ربنا يخليكي. إنتي عاملة إيه؟ عندك سؤال في المنهج ولا حاجة تساعديني فيها؟"
3. مفيش تحية "وعليكم السلام" في كل رد - ابداي مباشرة.
4. ممنوع استخدام أي كلمات صينية أو يابانية.
5. لو السؤال عن المنهج: اشرحي بإيجاز وبساطة مع مثال.
6. خلي ردك قصير ولطيف (بين 20 و 120 كلمة).
7. استخدمي كلمات زي "يا حبيبتي، يا قمر، يا ست الكل".`;

                const groqResponse = await fetch(GROQ_ENDPOINT, {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${GROQ_API_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: MODEL_NAME,
                        messages: [
                            { role: "system", content: systemPrompt },
                            { role: "user", content: userQuestion }
                        ],
                        temperature: 0.7,
                        max_tokens: 500
                    })
                });
                
                if (!groqResponse.ok) {
                    throw new Error("API error");
                }
                
                const groqData = await groqResponse.json();
                let aiReply = groqData.choices?.[0]?.message?.content;
                if (!aiReply) throw new Error("No reply");
                
                aiReply = cleanText(aiReply);
                
                const newId = Date.now().toString() + '_' + Math.random().toString(36).substr(2, 5);
                await sendMessageToSheet(newId, "أستاذة نور", "tutor_bot", aiReply, Date.now(), true);
                await fetchMessages();
                
                setStatus("✅ تم الرد", false);
                setTimeout(() => setStatus("✨ اسألي تاني لو حابة", false), 3000);
                
            } catch (error) {
                console.error("AI Error:", error);
                setStatus(`⚠️ خطأ: ${error.message.substring(0, 80)}`, false);
                
                const newId = Date.now().toString() + '_' + Math.random().toString(36).substr(2, 5);
                await sendMessageToSheet(newId, "أستاذة نور", "tutor_bot", "آسفة يا قمر، فيه مشكلة تقنية بسيطة. جربي تاني كده 🌸", Date.now(), true);
                await fetchMessages();
            } finally {
                isProcessing = false;
            }
        }
        
        let autoRefreshInterval;
        
        function startAutoRefresh() {
            autoRefreshInterval = setInterval(() => {
                fetchMessages();
            }, 2000);
        }
        
        async function addWelcomeMessageIfNeeded() {
            const response = await fetch(`${SHEET_API_URL}?action=get&t=${Date.now()}`);
            const data = await response.json();
            
            if (data.success && (!data.messages || data.messages.length === 0)) {
                const welcomeId = Date.now().toString() + '_welcome';
                await sendMessageToSheet(welcomeId, "أستاذة نور", "tutor_bot", "أهلاً يا حبيباتي دفعة 2026 🌙\nأنا أستاذة نور، معلمتكم الخصوصية. اسألوا عن أي حاجة في المنهج الأزهري، وبكلمكم باللهجة المصرية اللطيفة. متفتحة معاكم ومبسوطة بيكم 🤍", Date.now(), true);
                await fetchMessages();
            }
        }
        
        function init() {
            chatContainer = document.getElementById('chatMessages');
            messageInput = document.getElementById('messageInput');
            sendBtn = document.getElementById('sendBtn');
            aiRespondBtn = document.getElementById('aiRespondBtn');
            statusDiv = document.getElementById('statusMsg');
            
            if (!chatContainer) {
                console.error("عناصر غير موجودة");
                return;
            }
            
            fetchMessages();
            addWelcomeMessageIfNeeded();
            startAutoRefresh();
            
            sendBtn.addEventListener('click', sendMessage);
            aiRespondBtn.addEventListener('click', aiRespond);
            
            messageInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
            
            setStatus("✨ مرحباً يا أزهريات 2026", false);
        }
        
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    })();
</script>
</body>
</html>
