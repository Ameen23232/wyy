<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>أزهريات 2026 | ديسكورد الأزهر</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0e0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            font-family: -apple-system, 'SF Pro Text', 'SF Pro Display', 'Cairo', system-ui, sans-serif;
        }

        /* Discord-style container */
        .discord-container {
            max-width: 1000px;
            width: 100%;
            height: 92vh;
            background: #1e1f22;
            border-radius: 16px;
            display: flex;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Sidebar (قائمة المستخدمين) */
        .sidebar {
            width: 240px;
            background: #1a1b1e;
            display: flex;
            flex-direction: column;
            border-left: 1px solid #2b2d31;
        }

        .server-header {
            padding: 16px;
            border-bottom: 1px solid #2b2d31;
            background: #1e1f22;
        }

        .server-header h3 {
            color: #dbdee1;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .server-header p {
            color: #949ba4;
            font-size: 0.7rem;
            margin-top: 4px;
        }

        .members-list {
            flex: 1;
            padding: 12px;
            overflow-y: auto;
        }

        .member {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 10px;
            border-radius: 8px;
            color: #949ba4;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .member.online {
            color: #dbdee1;
            background: #2b2d31;
        }

        .member-avatar {
            width: 28px;
            height: 28px;
            background: #2b2d31;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
        }

        .member-status {
            width: 8px;
            height: 8px;
            background: #23a55a;
            border-radius: 50%;
            margin-right: auto;
        }

        /* Main chat area */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #313338;
        }

        .chat-header {
            padding: 16px 20px;
            border-bottom: 1px solid #2b2d31;
            background: #2b2d31;
        }

        .chat-header h2 {
            color: #dbdee1;
            font-size: 1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .chat-header p {
            color: #949ba4;
            font-size: 0.7rem;
            margin-top: 4px;
        }

        /* Messages area - Discord style */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #313338;
        }

        .messages-area::-webkit-scrollbar {
            width: 8px;
        }

        .messages-area::-webkit-scrollbar-track {
            background: #1e1f22;
            border-radius: 10px;
        }

        .messages-area::-webkit-scrollbar-thumb {
            background: #2b2d31;
            border-radius: 10px;
        }

        /* Discord message bubble */
        .message {
            display: flex;
            gap: 16px;
            padding: 8px 0;
            transition: background 0.1s;
            border-radius: 8px;
        }

        .message:hover {
            background: #2b2d31;
        }

        .message-avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #5865f2, #4752c4);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 1rem;
            flex-shrink: 0;
        }

        .message-content {
            flex: 1;
        }

        .message-header {
            display: flex;
            align-items: baseline;
            gap: 8px;
            margin-bottom: 4px;
        }

        .message-author {
            color: #dbdee1;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .message-time {
            color: #949ba4;
            font-size: 0.65rem;
        }

        .message-text {
            color: #dbdee1;
            font-size: 0.9rem;
            line-height: 1.45;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .tutor-message .message-avatar {
            background: linear-gradient(135deg, #b47c48, #8b5a2e);
        }

        .tutor-message .message-author {
            color: #f0b87a;
        }

        .own-message .message-avatar {
            background: linear-gradient(135deg, #23a55a, #1a7a45);
        }

        /* Input area - Discord style */
        .input-area {
            padding: 16px 20px 24px;
            background: #313338;
        }

        .input-wrapper {
            background: #383a40;
            border-radius: 44px;
            display: flex;
            align-items: flex-end;
            gap: 12px;
            padding: 8px 16px;
        }

        .input-wrapper textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: #dbdee1;
            font-size: 0.9rem;
            resize: none;
            font-family: inherit;
            outline: none;
            max-height: 100px;
            padding: 6px 0;
        }

        .input-wrapper textarea::placeholder {
            color: #949ba4;
        }

        .input-wrapper button {
            background: #5865f2;
            border: none;
            color: white;
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
        }

        .input-wrapper button:active {
            transform: scale(0.96);
        }

        .ai-btn {
            background: #b47c48;
        }

        .status-bar {
            background: #1e1f22;
            padding: 8px 20px;
            font-size: 0.7rem;
            color: #949ba4;
            display: flex;
            justify-content: space-between;
            border-top: 1px solid #2b2d31;
        }

        @media (max-width: 700px) {
            .sidebar { display: none; }
            .discord-container { border-radius: 24px; }
        }
    </style>
</head>
<body>

<div class="discord-container">
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="server-header">
            <h3>📚 نور الأزهر</h3>
            <p>دفعة 2026</p>
        </div>
        <div class="members-list" id="membersList">
            <div class="member online">
                <div class="member-avatar">🧑‍🏫</div>
                <span>أستاذة نور (AI)</span>
                <div class="member-status"></div>
            </div>
            <div class="member" id="currentUserMember">
                <div class="member-avatar">👧</div>
                <span id="currentUserName">أنتِ</span>
                <div class="member-status"></div>
            </div>
        </div>
    </div>

    <!-- Main Chat -->
    <div class="chat-area">
        <div class="chat-header">
            <h2># 🤍 دردشة الطالبات</h2>
            <p>جميع الطالبات يرون الرسائل - الدردشة عامة وجماعية</p>
        </div>

        <div class="messages-area" id="chatMessages"></div>

        <div class="input-area">
            <div class="input-wrapper">
                <textarea id="messageInput" rows="1" placeholder="اسألي عن أي درس في المنهج... أو قوليلي عامله ايه 😊"></textarea>
                <button id="sendBtn">إرسال</button>
                <button id="aiRespondBtn" class="ai-btn">🤖 رد بالذكاء</button>
            </div>
        </div>
        <div class="status-bar">
            <span id="statusMsg">✨ جاهزة للإجابة</span>
            <span>🟢 متصل</span>
        </div>
    </div>
</div>

<script>
    // -------------------- إعدادات Groq API --------------------
    const GROQ_API_KEY = "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";
    const GROQ_ENDPOINT = "https://api.groq.com/openai/v1/chat/completions";
    const MODEL_NAME = "llama-3.3-70b-versatile";
    
    // -------------------- إعدادات التخزين المحلي --------------------
    const STORAGE_KEY = "discord_azhar_messages";
    const USERS_KEY = "discord_azhar_users";
    
    // هوية المستخدم الحالي
    let currentUserId = localStorage.getItem('userId');
    if (!currentUserId) {
        currentUserId = 'user_' + Math.random().toString(36).substr(2, 8);
        localStorage.setItem('userId', currentUserId);
    }
    
    let currentUserName = localStorage.getItem('userName');
    if (!currentUserName) {
        currentUserName = 'طالبة_' + Math.floor(Math.random() * 1000);
        localStorage.setItem('userName', currentUserName);
    }
    
    // عرض اسم المستخدم في السايدبار
    document.getElementById('currentUserName').innerText = currentUserName;
    
    // تحميل الرسائل المخزنة
    let messages = [];
    
    function loadMessages() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
            try {
                messages = JSON.parse(saved);
            } catch(e) { messages = []; }
        }
        if (messages.length === 0) {
            // رسالة ترحيب
            messages.push({
                id: Date.now(),
                author: "أستاذة نور",
                authorId: "tutor",
                text: "أهلاً يا حبيباتي دفعة 2026 🌙\nأنا أستاذة نور، معلمتكم الخصوصية. اسألوا عن أي حاجة في المنهج الأزهري، وبكلمكم باللهجة المصرية اللطيفة. متفتحة معاكم ومبسوطة بيكم 🤍",
                timestamp: Date.now(),
                isTutor: true
            });
            saveMessages();
        }
        renderMessages();
    }
    
    function saveMessages() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(messages));
        // إرسال إشارة لجميع النوافذ المفتوحة عشان تتحدث
        broadcastChannel.postMessage({ type: 'new-message', messages: messages });
    }
    
    // قناة البث بين النوافذ (زي ديسكورد بالضبط)
    const broadcastChannel = new BroadcastChannel('azhar_chat');
    
    broadcastChannel.onmessage = (event) => {
        if (event.data.type === 'new-message') {
            // تحديث الرسائل من نافذة تانية
            messages = event.data.messages;
            renderMessages();
        }
    };
    
    function renderMessages() {
        const container = document.getElementById('chatMessages');
        container.innerHTML = '';
        
        messages.forEach(msg => {
            const isOwn = (msg.authorId === currentUserId);
            const isTutor = msg.isTutor === true;
            
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message';
            if (isTutor) messageDiv.classList.add('tutor-message');
            if (isOwn) messageDiv.classList.add('own-message');
            
            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            if (isTutor) avatar.innerText = '🧑‍🏫';
            else if (isOwn) avatar.innerText = '👧';
            else avatar.innerText = '👩‍🎓';
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            
            const header = document.createElement('div');
            header.className = 'message-header';
            header.innerHTML = `
                <span class="message-author">${escapeHtml(msg.author)}</span>
                <span class="message-time">${new Date(msg.timestamp).toLocaleTimeString('ar-EG', { hour: '2-digit', minute:'2-digit' })}</span>
            `;
            
            const textDiv = document.createElement('div');
            textDiv.className = 'message-text';
            textDiv.innerHTML = `<p style="margin:0; white-space:pre-wrap;">${escapeHtml(msg.text)}</p>`;
            
            contentDiv.appendChild(header);
            contentDiv.appendChild(textDiv);
            messageDiv.appendChild(avatar);
            messageDiv.appendChild(contentDiv);
            
            container.appendChild(messageDiv);
        });
        
        // التمرير للأسفل
        const container = document.getElementById('chatMessages');
        container.scrollTop = container.scrollHeight;
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function cleanText(text) {
        if (!text) return '';
        text = text.replace(/[\u4e00-\u9fff\u3400-\u4dbf\uac00-\ud7af\u3040-\u30ff]/g, '');
        text = text.replace(/【.*?】/g, '');
        text = text.replace(/\[.*?\]/g, '');
        text = text.replace(/وعليكم السلام ورحمة الله وبركاته/gi, '');
        text = text.replace(/السلام عليكم/gi, '');
        return text.trim();
    }
    
    function setStatus(msg, isLoading = false) {
        const statusSpan = document.getElementById('statusMsg');
        if (isLoading) {
            statusSpan.innerHTML = `<span class="loading" style="display:inline-block;width:12px;height:12px;border:2px solid #949ba4;border-top-color:#5865f2;border-radius:50%;animation:spin 0.6s linear infinite;margin-left:6px;"></span> ${msg}`;
        } else {
            statusSpan.innerHTML = msg;
        }
    }
    
    // إرسال رسالة عادية
    async function sendMessage() {
        const input = document.getElementById('messageInput');
        let text = input.value.trim();
        if (!text) {
            setStatus("⚠️ اكتبي سؤال أو رسالة", false);
            setTimeout(() => setStatus("✨ جاهزة", false), 1500);
            return;
        }
        
        const newMessage = {
            id: Date.now(),
            author: currentUserName,
            authorId: currentUserId,
            text: text,
            timestamp: Date.now(),
            isTutor: false
        };
        
        messages.push(newMessage);
        saveMessages();
        input.value = '';
        setStatus("✅ تم الإرسال", false);
        setTimeout(() => setStatus("✨ جاهزة", false), 1500);
    }
    
    // رد الذكاء الاصطناعي
    async function aiRespond() {
        // نجيب آخر رسالة مش من الأستاذة
        const lastUserMessage = [...messages].reverse().find(m => !m.isTutor);
        
        if (!lastUserMessage) {
            setStatus("⚠️ اكتبي سؤالك الأول عشان أرد عليكِ", false);
            setTimeout(() => setStatus("✨ جاهزة", false), 2000);
            return;
        }
        
        setStatus("📚 الأستاذة بتفكر...", true);
        
        const systemPrompt = `أنت أستاذة خصوصية مصرية لطالبات الصف الثاني الثانوي الأزهري (دفعة 2026). اسمك "أستاذة نور".
أسلوبك باللهجة المصرية اللطيفة والعفوية. لو الطالبة سألت سؤال زي "عامله ايه" تردي بلطف وتقولي "أنا زي الفل يا حبيبتي، ربنا يخليكي".
ماتفتحيش كل رد بتحية "وعليكم السلام". ماتستخدميش كلمات صينية خالص. خلي ردودك طبيعية مصرية ومفيدة.
لو السؤال عن المنهج: اشرحي بشكل دقيق ومبسط مع أمثلة.
خلي ردودك بين 50 و 250 كلمة.`;
        
        try {
            const response = await fetch(GROQ_ENDPOINT, {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${GROQ_API_KEY}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    model: MODEL_NAME,
                    messages: [
                        { role: "system", content: systemPrompt },
                        { role: "user", content: lastUserMessage.text }
                    ],
                    temperature: 0.8,
                    max_tokens: 1000
                })
            });
            
            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.error?.message || "خطأ في API");
            }
            
            const data = await response.json();
            let aiReply = data.choices?.[0]?.message?.content;
            if (!aiReply) throw new Error("لا يوجد رد");
            
            aiReply = cleanText(aiReply);
            
            const newMessage = {
                id: Date.now(),
                author: "أستاذة نور",
                authorId: "tutor",
                text: aiReply,
                timestamp: Date.now(),
                isTutor: true
            };
            
            messages.push(newMessage);
            saveMessages();
            setStatus("✅ تم الرد", false);
            setTimeout(() => setStatus("✨ اسألي تاني لو حابة", false), 3000);
            
        } catch (error) {
            console.error(error);
            setStatus(`⚠️ خطأ: ${error.message.substring(0, 80)}`, false);
            
            const errorMessage = {
                id: Date.now(),
                author: "أستاذة نور",
                authorId: "tutor",
                text: "آسفة يا قمر، فيه مشكلة تقنية بسيطة. جربي تاني كده أو شيكي على النت 🌸",
                timestamp: Date.now(),
                isTutor: true
            };
            messages.push(errorMessage);
            saveMessages();
        }
    }
    
    // إضافة animation للـ loading
    const style = document.createElement('style');
    style.textContent = `@keyframes spin { to { transform: rotate(360deg); } }`;
    document.head.appendChild(style);
    
    // ربط الأزرار
    document.getElementById('sendBtn').addEventListener('click', sendMessage);
    document.getElementById('aiRespondBtn').addEventListener('click', aiRespond);
    
    const textarea = document.getElementById('messageInput');
    textarea.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });
    
    // تحميل الرسائل
    loadMessages();
</script>
</body>
</html>
