<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>أزهريات 2026 | شات الأزهر</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0e0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            font-family: -apple-system, 'SF Pro Text', 'Cairo', system-ui, sans-serif;
        }

        .app-container {
            max-width: 800px;
            width: 100%;
            height: 94vh;
            background: #121812;
            border-radius: 32px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Header */
        .chat-header {
            background: #1a221a;
            padding: 1.2rem;
            text-align: center;
            border-bottom: 1px solid #2a302a;
        }
        .chat-header h1 {
            font-size: 1.5rem;
            color: #9ece9e;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .chat-header p {
            font-size: 0.7rem;
            color: #8a9a88;
            margin-top: 6px;
        }
        .online-info {
            background: #2c5a2e;
            color: #9ece9e;
            font-size: 0.65rem;
            padding: 4px 12px;
            border-radius: 20px;
            display: inline-block;
            margin-top: 8px;
        }

        /* Messages area */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #121812;
        }

        .messages-area::-webkit-scrollbar {
            width: 5px;
        }
        .messages-area::-webkit-scrollbar-track {
            background: #1a221a;
            border-radius: 10px;
        }
        .messages-area::-webkit-scrollbar-thumb {
            background: #3a4a3a;
            border-radius: 10px;
        }

        /* Message bubble */
        .message {
            display: flex;
            gap: 10px;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-avatar {
            width: 38px;
            height: 38px;
            background: linear-gradient(135deg, #2a5a2e, #1a3a1e);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        .message-content {
            background: #1e261e;
            padding: 10px 16px;
            border-radius: 20px;
            border-top-right-radius: 6px;
            max-width: 85%;
        }

        .message-meta {
            font-size: 0.65rem;
            color: #8a9a88;
            margin-bottom: 5px;
            display: flex;
            gap: 10px;
        }

        .message-text {
            font-size: 0.92rem;
            color: #e5f0e5;
            line-height: 1.45;
            white-space: pre-wrap;
            word-break: break-word;
        }

        /* Own message */
        .own-message {
            flex-direction: row-reverse;
        }
        .own-message .message-content {
            background: #2c5a2e;
            border-top-left-radius: 6px;
            border-top-right-radius: 20px;
        }
        .own-message .message-text {
            color: #ffffff;
        }

        /* Tutor message */
        .tutor-message .message-content {
            background: #2a2218;
            border-right: 3px solid #b47c48;
        }
        .tutor-message .message-author {
            color: #f0b87a;
        }

        /* Input area */
        .input-panel {
            background: #1a221a;
            padding: 12px 16px 20px;
            border-top: 1px solid #2a302a;
        }

        .input-row {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .input-row textarea {
            flex: 1;
            border: 1px solid #2a5a2e;
            border-radius: 28px;
            padding: 12px 18px;
            font-size: 0.92rem;
            resize: none;
            background: #0e140e;
            font-family: inherit;
            outline: none;
            color: #e5f0e5;
        }

        .input-row textarea::placeholder {
            color: #5a6a58;
        }

        .input-row textarea:focus {
            border-color: #6f9e6f;
        }

        button {
            background: #2c5a2e;
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        button:active {
            transform: scale(0.96);
        }

        .ai-btn {
            background: #b47c48;
        }

        .status {
            font-size: 0.7rem;
            color: #8a9a88;
            text-align: center;
            margin-top: 10px;
        }

        .loading {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid #5a6a58;
            border-top-color: #9ece9e;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-left: 6px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        footer {
            font-size: 0.6rem;
            text-align: center;
            background: #0e140e;
            padding: 6px;
            color: #5a6a58;
        }

        @media (max-width: 550px) {
            body { padding: 8px; }
            .app-container { height: 95vh; border-radius: 24px; }
            .message-content { max-width: 90%; }
            .ai-btn { padding: 8px 14px; font-size: 0.75rem; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="chat-header">
        <h1>📚 نور الأزهر | دفعة 2026</h1>
        <p>معلمتك الخصوصية 🧑‍🏫 | دردشة جماعية 👥</p>
        <div class="online-info">🟢 جميع الطالبات يرون كل الرسائل</div>
    </div>

    <div class="messages-area" id="chatMessages"></div>

    <div class="input-panel">
        <div class="input-row">
            <textarea id="messageInput" rows="1" placeholder="اسألي عن أي درس... أو قوليلي عامله ايه 😊"></textarea>
            <button id="sendBtn">📤 إرسال</button>
            <button id="aiRespondBtn" class="ai-btn">🤖 رد بالذكاء</button>
        </div>
        <div id="statusMsg" class="status">✨ جاهزة للإجابة</div>
    </div>
    <footer>🗨️ كل الرسائل تظهر لكل الطالبات • حفظ تلقائي • معلمة الأزهر الذكية</footer>
</div>

<script>
    (function() {
        // -------------------- إعدادات Groq API --------------------
        const GROQ_API_KEY = "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";
        const GROQ_ENDPOINT = "https://api.groq.com/openai/v1/chat/completions";
        const MODEL_NAME = "llama-3.3-70b-versatile";
        
        // -------------------- إعدادات التخزين --------------------
        const STORAGE_KEY = "azhar_group_chat";
        
        // هوية المستخدم
        let currentUserId = localStorage.getItem('azhar_user_id');
        if (!currentUserId) {
            currentUserId = 'user_' + Math.random().toString(36).substr(2, 10);
            localStorage.setItem('azhar_user_id', currentUserId);
        }
        
        let currentUserName = localStorage.getItem('azhar_user_name');
        if (!currentUserName) {
            const names = ['نور', 'أمل', 'سارة', 'ليلى', 'مريم', 'حبيبة', 'فاطمة', 'زينب'];
            currentUserName = names[Math.floor(Math.random() * names.length)] + '_' + Math.floor(Math.random() * 100);
            localStorage.setItem('azhar_user_name', currentUserName);
        }
        
        // مصفوفة الرسائل
        let messages = [];
        
        // عناصر DOM
        let chatContainer, messageInput, sendBtn, aiRespondBtn, statusDiv;
        
        // دالة تنظيف النص
        function cleanText(text) {
            if (!text) return '';
            text = text.replace(/[\u4e00-\u9fff\u3400-\u4dbf\uac00-\ud7af\u3040-\u30ff]/g, '');
            text = text.replace(/【.*?】/g, '');
            text = text.replace(/\[.*?\]/g, '');
            text = text.replace(/وعليكم السلام ورحمة الله وبركاته/gi, '');
            text = text.replace(/السلام عليكم ورحمة الله وبركاته/gi, '');
            text = text.replace(/السلام عليكم/gi, '');
            return text.trim();
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        // حفظ الرسائل
        function saveMessages() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(messages));
            // بث لكل النوافذ المفتوحة
            if (window.broadcastChannel) {
                window.broadcastChannel.postMessage({ type: 'update', messages: messages });
            }
        }
        
        // عرض الرسائل
        function renderMessages() {
            if (!chatContainer) return;
            chatContainer.innerHTML = '';
            
            messages.forEach(msg => {
                const isOwn = (msg.userId === currentUserId);
                const isTutor = msg.isTutor === true;
                
                const messageDiv = document.createElement('div');
                messageDiv.className = 'message';
                if (isOwn) messageDiv.classList.add('own-message');
                if (isTutor) messageDiv.classList.add('tutor-message');
                
                const avatar = document.createElement('div');
                avatar.className = 'message-avatar';
                if (isTutor) avatar.innerText = '🧑‍🏫';
                else if (isOwn) avatar.innerText = '👧';
                else avatar.innerText = '👩‍🎓';
                
                const contentDiv = document.createElement('div');
                contentDiv.className = 'message-content';
                
                const metaDiv = document.createElement('div');
                metaDiv.className = 'message-meta';
                const timeStr = msg.timeStr || new Date(msg.timestamp).toLocaleTimeString('ar-EG', { hour: '2-digit', minute:'2-digit' });
                metaDiv.innerHTML = `<span class="message-author">${escapeHtml(msg.author)}</span><span>${timeStr}</span>`;
                
                const textDiv = document.createElement('div');
                textDiv.className = 'message-text';
                textDiv.innerHTML = `<p style="margin:0; white-space:pre-wrap;">${escapeHtml(msg.text)}</p>`;
                
                contentDiv.appendChild(metaDiv);
                contentDiv.appendChild(textDiv);
                messageDiv.appendChild(avatar);
                messageDiv.appendChild(contentDiv);
                
                chatContainer.appendChild(messageDiv);
            });
            
            // التمرير للأسفل
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
        
        // تحميل الرسائل من التخزين
        function loadMessages() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                try {
                    messages = JSON.parse(saved);
                } catch(e) {
                    messages = [];
                }
            }
            
            // إذا مفيش رسائل، نضيف رسالة ترحيب
            if (messages.length === 0) {
                messages.push({
                    id: Date.now(),
                    userId: 'tutor',
                    author: 'أستاذة نور',
                    text: 'أهلاً يا حبيباتي دفعة 2026 🌙\nأنا أستاذة نور، معلمتكم الخصوصية. اسألوا عن أي حاجة في المنهج الأزهري، وبكلمكم باللهجة المصرية اللطيفة. متفتحة معاكم ومبسوطة بيكم 🤍',
                    timestamp: Date.now(),
                    isTutor: true,
                    timeStr: new Date().toLocaleTimeString('ar-EG', { hour: '2-digit', minute:'2-digit' })
                });
                saveMessages();
            }
            
            renderMessages();
        }
        
        // إرسال رسالة
        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text) {
                setStatus("⚠️ اكتبي سؤال أو رسالة", false);
                setTimeout(() => setStatus("✨ جاهزة", false), 1500);
                return;
            }
            
            const newMessage = {
                id: Date.now(),
                userId: currentUserId,
                author: currentUserName,
                text: text,
                timestamp: Date.now(),
                isTutor: false,
                timeStr: new Date().toLocaleTimeString('ar-EG', { hour: '2-digit', minute:'2-digit' })
            };
            
            messages.push(newMessage);
            saveMessages();
            renderMessages();
            messageInput.value = '';
            setStatus("✅ تم الإرسال", false);
            setTimeout(() => setStatus("✨ جاهزة", false), 1500);
        }
        
        // رد الذكاء الاصطناعي
        async function aiRespond() {
            // البحث عن آخر رسالة مش من الأستاذة
            const lastUserMessage = [...messages].reverse().find(m => !m.isTutor);
            
            if (!lastUserMessage) {
                setStatus("⚠️ اكتبي سؤالك الأول عشان أرد عليكِ", false);
                setTimeout(() => setStatus("✨ جاهزة", false), 2000);
                return;
            }
            
            setStatus("📚 الأستاذة بتفكر...", true);
            
            const systemPrompt = `أنت أستاذة خصوصية مصرية لطالبات الصف الثاني الثانوي الأزهري (دفعة 2026). اسمك "أستاذة نور".
أسلوبك باللهجة المصرية اللطيفة والعفوية. لو الطالبة سألت سؤال زي "عامله ايه" أو "ازيك" تردي بلطف وتقولي "أنا زي الفل يا حبيبتي، ربنا يخليكي، عندك سؤال في المنهج؟"
ماتفتحيش كل رد بتحية "وعليكم السلام". ماتستخدميش كلمات صينية خالص. خلي ردودك طبيعية مصرية ومفيدة.
لو السؤال عن المنهج: اشرحي بشكل دقيق ومبسط مع أمثلة من الكتاب المدرسي.
خلي ردودك بين 50 و 250 كلمة.
ابدأي الرد مباشرة بدون أي تحية.`;
            
            try {
                const response = await fetch(GROQ_ENDPOINT, {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${GROQ_API_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: MODEL_NAME,
                        messages: [
                            { role: "system", content: systemPrompt },
                            { role: "user", content: lastUserMessage.text }
                        ],
                        temperature: 0.8,
                        max_tokens: 1000
                    })
                });
                
                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error?.message || "خطأ في الاتصال");
                }
                
                const data = await response.json();
                let aiReply = data.choices?.[0]?.message?.content;
                if (!aiReply) throw new Error("لا يوجد رد");
                
                aiReply = cleanText(aiReply);
                
                const newMessage = {
                    id: Date.now(),
                    userId: 'tutor',
                    author: 'أستاذة نور',
                    text: aiReply,
                    timestamp: Date.now(),
                    isTutor: true,
                    timeStr: new Date().toLocaleTimeString('ar-EG', { hour: '2-digit', minute:'2-digit' })
                };
                
                messages.push(newMessage);
                saveMessages();
                renderMessages();
                setStatus("✅ تم الرد", false);
                setTimeout(() => setStatus("✨ اسألي تاني لو حابة", false), 3000);
                
            } catch (error) {
                console.error("AI Error:", error);
                setStatus(`⚠️ خطأ: ${error.message.substring(0, 80)}`, false);
                
                const errorMessage = {
                    id: Date.now(),
                    userId: 'tutor',
                    author: 'أستاذة نور',
                    text: "آسفة يا قمر، فيه مشكلة تقنية بسيطة. جربي تاني كده أو شيكي على النت 🌸",
                    timestamp: Date.now(),
                    isTutor: true,
                    timeStr: new Date().toLocaleTimeString('ar-EG', { hour: '2-digit', minute:'2-digit' })
                };
                messages.push(errorMessage);
                saveMessages();
                renderMessages();
            }
        }
        
        function setStatus(msg, isLoading = false) {
            if (statusDiv) {
                if (isLoading) {
                    statusDiv.innerHTML = `<span class="loading"></span> ${msg}`;
                } else {
                    statusDiv.innerHTML = msg;
                }
            }
        }
        
        // إعداد البث بين النوافذ
        function setupBroadcast() {
            window.broadcastChannel = new BroadcastChannel('azhar_chat_2026');
            window.broadcastChannel.onmessage = (event) => {
                if (event.data.type === 'update') {
                    messages = event.data.messages;
                    renderMessages();
                }
            };
        }
        
        // تهيئة العناصر بعد تحميل الصفحة
        function init() {
            chatContainer = document.getElementById('chatMessages');
            messageInput = document.getElementById('messageInput');
            sendBtn = document.getElementById('sendBtn');
            aiRespondBtn = document.getElementById('aiRespondBtn');
            statusDiv = document.getElementById('statusMsg');
            
            if (!chatContainer || !sendBtn || !aiRespondBtn) {
                console.error("عناصر غير موجودة");
                return;
            }
            
            loadMessages();
            setupBroadcast();
            
            sendBtn.addEventListener('click', sendMessage);
            aiRespondBtn.addEventListener('click', aiRespond);
            
            messageInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
            
            setStatus("✨ مرحباً يا أزهريات 2026", false);
        }
        
        // تشغيل بعد تحميل الصفحة
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    })();
</script>
</body>
</html>
